name: "YouTube Cards Generator"
description: "Generates individual SVG video cards and injects dynamic per-video links into your README"
author: "Sashikumar Yadav"

branding:
  icon: "video"
  color: "red"

inputs:
  channel_id:
    description: "Your YouTube Channel ID"
    required: true
  output_dir:
    description: "Folder to save the individual card SVGs"
    required: false
    default: "assets"
  max_videos:
    description: "Number of videos to display (1–4)"
    required: false
    default: "4"
  theme:
    description: 'Card theme — "dark" or "light"'
    required: false
    default: "dark"
  readme_path:
    description: "Path to your README.md file"
    required: false
    default: "README.md"

outputs:
  output_dir:
    description: "Folder where card SVGs were saved"
    value: ${{ steps.generate.outputs.output_dir }}

runs:
  using: "node20"
  main: "dist/index.js"

# Example: How anyone uses this action in their own profile repo
name: Update YouTube Cards

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate YouTube Cards
        uses: yshashi/youtube-cards@v1 # <-- that's it!
        with:
          channel_id: "UCW4PLi-ObJt3m6YTSEQY3gw"
          output_path: "assets/youtube-cards.svg"
          max_videos: "4"
          theme: "dark" # or 'light'

      - name: Commit SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/youtube-cards.svg
          git diff --staged --quiet || git commit -m "chore: update YouTube cards [skip ci]"
          git push
